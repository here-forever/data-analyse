services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-data_analysis_system}
      POSTGRES_USER: ${POSTGRES_USER:-data_analysis_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-data_analysis_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      APP_ENV: development
      APP_DEBUG: "true"
      APP_SECRET_KEY: ${APP_SECRET_KEY:-local-development-only-secret}
      EXTERNAL_CONNECTION_ENCRYPTION_KEY: ${EXTERNAL_CONNECTION_ENCRYPTION_KEY:-local-development-only-credential-key}
      BACKEND_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-data_analysis_user}:${POSTGRES_PASSWORD:-data_analysis_password}@postgres:5432/${POSTGRES_DB:-data_analysis_system}
      REDIS_URL: redis://redis:6379/0
      LOCAL_STORAGE_ROOT: /app/storage
      UPLOAD_STORAGE_ROOT: /app/storage/uploads
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./scripts:/demo/scripts:ro
      - ./examples:/demo/examples:ro
      - backend_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000/api
      VITE_DEV_ACCESS_TOKEN: ${VITE_DEV_ACCESS_TOKEN:-local-dev-token-usr_admin}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5173').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    image: python:3.13-slim
    profiles:
      - worker
    command: ["python", "-c", "print('Worker placeholder reserved for Celery/RQ milestone')"]

volumes:
  postgres_data:
  redis_data:
  backend_storage:
  frontend_node_modules:
